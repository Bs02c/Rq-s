services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      #Para no poner credenciales sensibles docker compose lee automaticamente el archivo .env, allí se encuentran estas credenciales.
      POSTGRES_USER: ${POSTGRES_USER}
      # Password es la unica requerida para iniciar el contenedor de postgres, si no se especifica, el contenedor no se iniciará
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - ./docker/tables.sql:/docker-entrypoint-initdb.d/tables.sql
      - postgres_data:/var/lib/postgresql/data

  backend: 
    build: 
      context: .
      dockerfile: docker/dockerfile.backend
      # "Context" es la ruta donde se encuentra el dockerfile y "dockerfile: ..." es la ruta donde está el dockerfile.backend
    ports:
      - "3000:3000" 
      # 3000 es la convención mas no es obligatorio, se puede cambiar por cualquier otro puerto
    depends_on: 
      postgres:
        condition: service_healthy
      #depends_on dice que hasta que postgres no este listo, backend no se iniciará
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 40s
  frontend:
    build: 
      context: .
      dockerfile: docker/dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    